<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root {
  --gold1: #aa771c;
  --gold2: #d4af37;
  --gold3: #f3e5ab;
  --gold4: #ffea85;
  --bg-deep: #020712;
  --bg-mid: #06142e;
}

body {
  background: radial-gradient(ellipse at 30% 20%, #0a1f4e 0%, #06142e 40%, #020712 100%);
  color: #e2e8f0;
  font-family: 'Segoe UI', Arial, sans-serif;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}

/* ===== INTRO OVERLAY ===== */
#introOverlay {
  position: fixed;
  inset: 0;
  background: #020712;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 30px;
}

#introLogo {
  width: 120px;
  opacity: 0;
}

#typewriterText {
  font-size: clamp(1rem, 3vw, 1.4rem);
  letter-spacing: 4px;
  color: var(--gold3);
  text-transform: uppercase;
  font-weight: 300;
  min-height: 2em;
  text-align: center;
  padding: 0 20px;
}

#countdownWrap {
  display: none;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

#countdown {
  font-size: clamp(3rem, 10vw, 6rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold1), var(--gold4), var(--gold1));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  text-shadow: none;
}

#countdownLabel {
  font-size: 0.75rem;
  letter-spacing: 4px;
  color: #718096;
  text-transform: uppercase;
}

/* ===== MAIN CONTAINER ===== */
.container {
  text-align: center;
  max-width: 820px;
  width: 92vw;
  padding: 10px;
  transition: opacity 0.8s ease;
}

.brand-header { margin-bottom: 22px; }

.brand-header h1 {
  font-size: clamp(1.1rem, 3.5vw, 1.8rem);
  letter-spacing: 2px;
  color: #fff;
  font-weight: 700;
}

.separator {
  width: 60px; height: 3px;
  background: linear-gradient(90deg, var(--gold1), var(--gold3), var(--gold1));
  margin: 12px auto;
  border-radius: 2px;
}

.brand-header h2 {
  font-size: clamp(1.1rem, 3vw, 1.5rem);
  font-weight: 700;
  color: var(--gold4);
  letter-spacing: 1.5px;
  text-shadow: 0 0 15px rgba(254, 234, 133, 0.7);
  text-transform: uppercase;
}

.subtitle {
  margin-bottom: 20px;
  color: #718096;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 3px;
}

.logo {
  width: clamp(70px, 12vw, 105px);
  margin-bottom: 15px;
}

/* ===== SIGNATURE ===== */
.signature-container {
  background: rgba(255,255,255,0.03);
  padding: 15px;
  border-radius: 12px;
  border: 1px solid rgba(212,175,55,0.15);
  box-shadow: inset 0 0 20px rgba(0,0,0,0.4);
  margin-bottom: 20px;
}

.signature-container label {
  display: block;
  font-size: 0.75rem;
  letter-spacing: 2px;
  color: #a0aec0;
  margin-bottom: 10px;
  font-weight: 600;
}

.pad-wrapper {
  position: relative;
  width: 100%;
  height: clamp(160px, 28vw, 240px);
  overflow: hidden;
  border-radius: 6px;
  background: #ffffff;
  border: 1px solid #ddd;
  transition: all 0.5s cubic-bezier(0.4,0,0.2,1);
  touch-action: none;
}

#signature-pad {
  width: 100%; height: 100%;
  background: transparent;
  cursor: crosshair;
  touch-action: none;
}

/* ===== BUTTONS ===== */
.buttons { margin-top: 20px; }

button {
  padding: clamp(10px, 2vw, 14px) clamp(16px, 4vw, 28px);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  margin: 0 8px;
  font-size: clamp(0.75rem, 2vw, 0.9rem);
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
}

#clearBtn {
  background: transparent;
  color: #a0aec0;
  border: 1px solid rgba(160,174,192,0.4);
}
#clearBtn:hover { background: rgba(160,174,192,0.1); color: #fff; }

#launchBtn {
  background: linear-gradient(135deg, var(--gold1) 0%, var(--gold3) 50%, var(--gold1) 100%);
  color: #030c1e;
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}
#launchBtn:not(:disabled):hover {
  box-shadow: 0 0 25px rgba(212,175,55,0.5);
  transform: translateY(-2px);
}
#launchBtn:disabled {
  background: #2d3748;
  color: #718096;
  opacity: 0.5;
  cursor: not-allowed;
}

#verifyStatus {
  margin-bottom: 15px;
  min-height: 25px;
  font-size: 0.9rem;
  letter-spacing: 1px;
}
.verifying { color: var(--gold3); }
.verified { color: #48bb78; }

/* ===== REVEAL SCREEN ===== */
#revealScreen {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-deep);
  z-index: 999;
  pointer-events: none;
}

#animationCanvas {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  z-index: 5;
}

#finalContent {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transform: scale(0.85);
  z-index: 10;
}

#revealLogo {
  width: clamp(120px, 22vw, 200px);
  margin-bottom: 25px;
  position: relative;
  z-index: 12;
}

#launchTitle {
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  font-weight: 700;
  letter-spacing: 4px;
  background: linear-gradient(135deg, #bfc5ca 0%, #fff 50%, #b2b7bc 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 15px;
  position: relative;
  z-index: 12;
  overflow: hidden;
}

/* Typewriter mask for reveal title */
#launchTitle .char {
  display: inline-block;
  opacity: 0;
  transform: translateY(20px);
}

.gold-bar {
  width: 120px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold2), transparent);
  margin-bottom: 15px;
  z-index: 12;
}

#launchText {
  font-size: clamp(0.8rem, 2vw, 1.1rem);
  color: var(--gold4);
  font-weight: 600;
  letter-spacing: 2px;
  z-index: 12;
  text-shadow: 0 0 10px rgba(254, 234, 133, 0.5);
  text-transform: uppercase;
}

/* ===== MOBILE TOUCH HINT ===== */
.touch-hint {
  font-size: 0.7rem;
  color: #4a5568;
  letter-spacing: 1px;
  margin-top: 8px;
  display: none;
}
@media (pointer: coarse) { .touch-hint { display: block; } }

/* ===== RIPPLE ON LAUNCH BTN ===== */
#launchBtn { position: relative; overflow: hidden; }
.ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.35);
  transform: scale(0);
  animation: rippleAnim 0.6s linear;
  pointer-events: none;
}
@keyframes rippleAnim {
  to { transform: scale(4); opacity: 0; }
}

/* Starfield background dots */
#starfield {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--dur) ease-in-out infinite alternate;
  opacity: 0;
}
@keyframes twinkle {
  0% { opacity: 0; }
  100% { opacity: var(--max-op); }
}
</style>
</head>

// ADVANCED ENHANCED CORPORATE AUDIO ENGINE

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;

function initAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playTone(freq, type, duration, volume=0.3, startDelay=0) {
  try {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startDelay);
    gain.gain.setValueAtTime(0, audioCtx.currentTime + startDelay);
    gain.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + startDelay + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + startDelay + duration);
    osc.start(audioCtx.currentTime + startDelay);
    osc.stop(audioCtx.currentTime + startDelay + duration + 0.05);
  } catch(e) {}
}

const phrases = [

function typeWrite(text, el, speed=55) {
  return new Promise(resolve => {
    el.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      el.textContent += text[i++];
      playTypeTick(); 
      if (i >= text.length) { clearInterval(interval); setTimeout(resolve, 400); }
    }, speed);
  });
}

async function runIntro() {
  document.body.addEventListener('click', initAudio, { once: true });
  document.body.addEventListener('touchstart', initAudio, { once: true });

  // Logo fade in
  await new Promise(r => setTimeout(r, 300));

  await new Promise(r => setTimeout(r, 800));

  // Typewriter phrases

    await typeWrite(phrase, typewriterEl, 45);
    await new Promise(r => setTimeout(r, 150));
  }

  await new Promise(r => setTimeout(r, 300));
  typewriterEl.style.opacity = '0';
  typewriterEl.style.transition = 'opacity 0.3s';

  // Countdown
  countdownWrap.style.display = 'flex';
  for (let n = 3; n >= 1; n--) {
    countdownEl.textContent = n;
    playCountdownBeep(n); 
    gsap.from(countdownEl, { scale: 1.5, opacity: 0, duration: 0.4, ease: 'back.out(2)' });
    await new Promise(r => setTimeout(r, 900));
  }

  // GO!
  countdownEl.textContent = 'GO';
  playCountdownBeep(0); 
  gsap.from(countdownEl, { scale: 2, opacity: 0, duration: 0.4, ease: 'back.out(2)' });
  await new Promise(r => setTimeout(r, 600));

  // Transition out intro
  gsap.to(introOverlay, {
    opacity: 0, duration: 0.8, ease: 'power2.in',
    onComplete: () => {
      introOverlay.style.display = 'none';
      gsap.to(mainContainer, { opacity: 1, duration: 0.8, ease: 'power2.out' });
    }
  });
}

// ============================================================
// SIGNATURE PAD SETUP
// ============================================================
const canvas = document.getElementById('signature-pad');
const launchBtn = document.getElementById('launchBtn');
const clearBtn = document.getElementById('clearBtn');
const revealScreen = document.getElementById('revealScreen');
const verifyStatus = document.getElementById('verifyStatus');

const ctx = animCanvas.getContext('2d');
let signaturePad;

function resizeCanvases() {
  const ratio = Math.max(window.devicePixelRatio || 1, 1);
  canvas.width = canvas.offsetWidth * ratio;
  canvas.height = canvas.offsetHeight * ratio;
  canvas.getContext('2d').scale(ratio, ratio);
  animCanvas.width = window.innerWidth;
  animCanvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvases);

function enableLaunchButton() {
  if (!signaturePad.isEmpty()) {
    playVerifySound();
    verifyStatus.innerHTML = '⏳ SECURITY AUTHS VERIFYING...';

      verifyStatus.className = 'verified';
      launchBtn.disabled = false;
    }, 1200);

}

clearBtn.addEventListener('click', () => {

// ============================================================
// PARTICLE ENGINE — GOLD SCATTER + FIREWORKS + AMBIENT FLOAT
// ============================================================
let particles = [];
let animationStage = 0;

const goldPalette = ['#ffea85','#d4af37','#aa771c','#f3e5ab','#f1c40f','#fffde7','#ffd700'];

class Particle {
  constructor(x, y, mode='scatter') {
    this.x = x; this.y = y;
    this.mode = mode;
    this.size = Math.random() * 3 + 1;
    this.color = goldPalette[Math.floor(Math.random() * goldPalette.length)];
    this.alpha = 1;
    if (mode === 'scatter') {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 8 + 2;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed - 3;
      this.gravity = 0.07;
      this.friction = 0.97;
      this.fadeSpeed = Math.random() * 0.012 + 0.006;
    } else if (mode === 'firework') {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 12 + 4;
      this.vx = Math.cos(angle) * speed;
      this.vy = Math.sin(angle) * speed;
      this.gravity = 0.15;
      this.friction = 0.95;
      this.fadeSpeed = Math.random() * 0.015 + 0.008;
      this.trail = [];
    } else {
      this.y = Math.random() * window.innerHeight;
      this.x = Math.random() * window.innerWidth;
      this.vx = (Math.random() - 0.5) * 0.3;
      this.vy = -(Math.random() * 0.4 + 0.1);
      this.alpha = Math.random() * 0.6 + 0.2;
      this.size = Math.random() * 2 + 0.5;
      this.fadeSpeed = 0;
    }
  }

  update() {
    if (this.mode === 'scatter' && animationStage === 1) {
      if (this.trail) this.trail.push({x:this.x,y:this.y,a:this.alpha});
      if (this.trail && this.trail.length > 5) this.trail.shift();
      this.x += this.vx; this.y += this.vy;
      this.vy += this.gravity;
      this.vx *= this.friction; this.vy *= this.friction;
      this.alpha -= this.fadeSpeed;
    } else if (this.mode === 'firework') {
      this.trail = this.trail || [];
      this.trail.push({x:this.x,y:this.y,a:this.alpha});
      if (this.trail.length > 8) this.trail.shift();
      this.x += this.vx; this.y += this.vy;
      this.vy += this.gravity;
      this.vx *= this.friction; this.vy *= this.friction;
      this.alpha -= this.fadeSpeed;
    } else if (this.mode === 'ambient') {
      this.x += this.vx; this.y += this.vy;
      if (this.y < 0) {
        this.y = window.innerHeight;
        this.x = Math.random() * window.innerWidth;
        this.alpha = Math.random() * 0.6 + 0.2;
      }
    }
  }

  draw() {
    if (this.alpha <= 0) return;
    ctx.save();
    if (this.trail && this.trail.length > 0) {
      this.trail.forEach((pt, i) => {
        ctx.globalAlpha = pt.a * (i / this.trail.length) * 0.4;
        ctx.beginPath();
        ctx.arc(pt.x, pt.y, this.size * 0.5, 0, Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
      });
    }
    ctx.globalAlpha = Math.max(0, this.alpha);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fillStyle = this.color;
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#d4af37';
    ctx.fill();
    ctx.restore();
  }
}

function spawnFirework(x, y) {
  for (let i = 0; i < 60; i++) {
    const p = new Particle(x, y, 'firework');
    particles.push(p);
  }
}

function setupParticleSystem() {
  particles = [];
  const sigLines = signaturePad.toData();
  if (sigLines.length > 0) {
    sigLines.forEach(line => {
      line.points.forEach(pt => {
        const rect = canvas.getBoundingClientRect();
        for (let k = 0; k < 3; k++) {
          particles.push(new Particle(rect.left + pt.x, rect.top + pt.y, 'scatter'));
        }
      });
    });
  }
}

function setupAmbientParticles() {
  for (let i = 0; i < 200; i++) {
    particles.push(new Particle(
      Math.random() * window.innerWidth,
      Math.random() * window.innerHeight,
      'ambient'
    ));
  }
}

let fireworkScheduled = [];
function scheduleFireworks() {
  const positions = [
    [window.innerWidth*0.2, window.innerHeight*0.3],
    [window.innerWidth*0.8, window.innerHeight*0.25],
    [window.innerWidth*0.5, window.innerHeight*0.2],
    [window.innerWidth*0.15, window.innerHeight*0.6],
    [window.innerWidth*0.85, window.innerHeight*0.6],
    [window.innerWidth*0.35, window.innerHeight*0.15],
    [window.innerWidth*0.65, window.innerHeight*0.15],
  ];
  positions.forEach(([x,y], i) => {
    fireworkScheduled.push(setTimeout(() => {
      spawnFirework(x, y);
      playFireworkExplosion(); 
    }, i * 500 + 200));
  });
}

function animate() {
  ctx.clearRect(0, 0, animCanvas.width, animCanvas.height);
  particles = particles.filter(p => p.alpha > 0 || p.mode === 'ambient');
  particles.forEach(p => { p.update(); p.draw(); });
  requestAnimationFrame(animate);
}

  sigCtx.fillRect(0, 0, canvas.width, canvas.height);

      scale: 1.08, duration: 1.5, repeat: -1, yoyo: true, ease: 'power1.inOut'
    });

    setTimeout(() => playSuccessChime(), 1500);

  }, 6500);

  // Step 4: Redirect
  setTimeout(() => {
    window.location.href = 'https://www.welfare.dlb.lk';
  }, 12500);
});
